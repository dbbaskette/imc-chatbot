---
applications:
- name: imc-chatbot
  path: ./target/imc-chatbot-4.0.5.jar
  buildpacks:
    - java_buildpack_offline
  
  # Runtime Configuration
  memory: 1G
  disk_quota: 2G
  instances: 1
  timeout: 180
  
  # Environment Configuration
  env:
    SPRING_PROFILES_ACTIVE: cloud,mcp
    JBP_CONFIG_OPEN_JDK_JRE: '{ jre: { version: 21.+ } }'
    JAVA_OPTS: >-
      -XX:MaxRAMPercentage=75.0
      -XX:+UseG1GC
      -XX:+UseContainerSupport
      -Djava.security.egd=file:/dev/./urandom
    
    # Application Settings
    SPRING_APPLICATION_NAME: imc-chatbot
    
    # AI Model Configuration
    # SPRING_AI_OPENAI_CHAT_OPTIONS_MODEL: gpt-4o-mini
    # SPRING_AI_OPENAI_CHAT_OPTIONS_TEMPERATURE: 0.7
    # SPRING_AI_OPENAI_CHAT_OPTIONS_MAX_TOKENS: 2000
    
    # MCP Client Configuration
    SPRING_AI_MCP_CLIENT_TOOLCALLBACK_ENABLED: true
    SPRING_AI_MCP_CLIENT_TYPE: SYNC
    SPRING_AI_MCP_CLIENT_CONNECTION_RESILIENT: true
    SPRING_AI_MCP_CLIENT_SSE_LENIENT_PARSING: true
    
    # Logging Configuration
    LOGGING_LEVEL_COM_INSURANCEMEGACORP_IMCCHATBOT: INFO
    LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_AI: WARN
    LOGGING_LEVEL_IO_MODELCONTEXTPROTOCOL_CLIENT: INFO
    
    # Insurance-Specific Settings
    IMC_CHATBOT_VERSION: 3.0.0
    IMC_CHATBOT_ENVIRONMENT: production
    IMC_CHATBOT_COMPANY: Insurance MegaCorp
  
  # Service Bindings
  services:
    # AI Services
    - chat-model