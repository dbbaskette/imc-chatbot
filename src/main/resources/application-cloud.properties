# Cloud Foundry Profile Configuration
# This profile is used for Cloud Foundry deployment with bound OpenAI service

# OpenAI Configuration - Uses service binding, no API key needed
spring.ai.openai.chat.options.model=gpt-4
spring.ai.openai.chat.options.temperature=0.7
spring.ai.openai.chat.options.max-tokens=2000

# MCP Configuration (cloud endpoints - set via environment variables)
spring.ai.mcp.client.sse.connections.imc-policy.url=${POLICY_MCP_URL:http://localhost:3001/sse}
spring.ai.mcp.client.sse.connections.imc-policy.enabled=${POLICY_MCP_ENABLED:false}
spring.ai.mcp.client.sse.connections.imc-accident.url=${ACCIDENT_MCP_URL:http://localhost:3002/sse}
spring.ai.mcp.client.sse.connections.imc-accident.enabled=${ACCIDENT_MCP_ENABLED:false}

# Application Settings
spring.application.name=imc-chatbot
server.port=${PORT:8080}
logging.level.com.insurancemegacorp.imcchatbot=INFO
logging.level.org.springframework.ai=WARN

# MCP Connection Settings
spring.ai.mcp.client.toolcallback.enabled=false
spring.ai.mcp.client.connection.resilient=true
spring.ai.mcp.client.sse.lenient-parsing=true

# Production System Prompt for Cloud Environment
imc.chatbot.system-prompt=You are IMC Assistant, the official AI customer service representative for Insurance MegaCorp. \
You provide professional assistance to customers and employees with insurance policies, claims, and general insurance questions. \
You represent Insurance MegaCorp and should maintain the highest standards of customer service. \
Be helpful, professional, accurate, and efficient in your responses. \
When you need specific customer or policy information, ask customers to provide their policy number or customer ID for secure verification. \
For sensitive account information or complex claims issues, always direct customers to contact our secure customer service line. \
Protect customer privacy and never share or discuss one customer's information with another. \
If you encounter issues you cannot resolve, politely escalate to our human customer service team.