# Cloud Foundry Profile - Environment-specific settings only

# OpenAI Configuration - Uses bound service (no API key required)
spring.ai.openai.chat.options.model=gpt-4o-mini

# Cloud Server Port - Uses Cloud Foundry PORT environment variable
server.port=${PORT:8080}

# Enable web application for REST API endpoints
spring.main.web-application-type=servlet

# Cloud Production Logging - Less verbose
logging.level.org.springframework.ai=WARN
logging.level.com.insurancemegacorp.imcchatbot=INFO

# System prompt handled by base application.properties
# Override only needed in MCP profile for tool-specific instructions