# Local Development Profile Configuration
# This profile is used for local development with OpenAI API key

# OpenAI Configuration
spring.ai.openai.api-key=${OPENAI_API_KEY}
spring.ai.openai.chat.options.model=gpt-4.1-nano
spring.ai.openai.chat.options.temperature=0.7
spring.ai.openai.chat.options.max-tokens=2000

# MCP Configuration - DISABLED for chat-only mode
# Uncomment and configure when MCP servers are available
#spring.ai.mcp.client.sse.connections.imc-policy.url=https://imc-policy-mcp-server.apps.tas-ndc.kuhn-labs.com
#spring.ai.mcp.client.sse.connections.imc-policy.sse-endpoint=/sse
#spring.ai.mcp.client.sse.connections.imc-policy.enabled=true
#spring.ai.mcp.client.sse.connections.imc-accident.url=http://localhost:3002/sse
#spring.ai.mcp.client.sse.connections.imc-accident.enabled=true

# Application Settings
spring.application.name=imc-chatbot
server.port=${SERVER_PORT:8080}
logging.level.com.insurancemegacorp.imcchatbot=DEBUG
logging.level.org.springframework.ai=INFO

# MCP Connection Settings
spring.ai.mcp.client.connection.resilient=true
spring.ai.mcp.client.sse.lenient-parsing=true

# Local Development System Prompt (enhanced with development context)
imc.chatbot.system-prompt=You are IMC Assistant, an AI helper for Insurance MegaCorp (Development Environment). \
You help customers and employees with insurance policies, claims, and general insurance questions. \
You have access to tools that can query customer information, policy details, and our knowledge base. \
When customers ask about specific policies or claims, use the available tools to provide accurate information. \
Be helpful, professional, and concise in your responses. \
If you need more information to help properly, ask specific questions. \
For complex issues that require human intervention, suggest contacting our customer service team. \
Note: You are running in development mode with test data.