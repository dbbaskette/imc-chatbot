# MCP Profile - Enable MCP server connections
# Use this profile when MCP servers are available
# Run with: --spring.profiles.active=local,mcp

# MCP Tool Integration
spring.ai.mcp.client.toolcallback.enabled=true

# MCP Server Connections
spring.ai.mcp.client.sse.connections.imc-policy.url=https://imc-policy-mcp-server.apps.tas-ndc.kuhn-labs.com/
spring.ai.mcp.client.sse.connections.imc-policy.sse-endpoint=/sse
spring.ai.mcp.client.sse.connections.imc-policy.enabled=true

#spring.ai.mcp.client.sse.connections.imc-accident.url=http://localhost:3002/sse
#spring.ai.mcp.client.sse.connections.imc-accident.enabled=true

# MCP Connection Settings
spring.ai.mcp.client.connection.resilient=true
spring.ai.mcp.client.sse.lenient-parsing=true

# Connection timeout and resilience settings
spring.ai.mcp.client.request-timeout=30s
spring.ai.mcp.client.initialized=true

# Enable connection monitoring and health checks
spring.ai.mcp.client.root-change-notification=true

# Heartbeat Configuration - Keep connections alive
# Adaptive heartbeat with exponential backoff
mcp.heartbeat.enabled=true
mcp.heartbeat.min-interval=30s
mcp.heartbeat.max-interval=5m
mcp.heartbeat.backoff-multiplier=2

# Circuit Breaker Configuration
mcp.resilience.circuit-breaker.threshold=5
mcp.resilience.circuit-breaker.timeout=2m

# Additional Connection Timeout Settings
# These help prevent various types of timeouts
spring.ai.mcp.client.sse.connections.imc-policy.keep-alive-interval=30s
spring.ai.mcp.client.sse.connections.imc-policy.connection-timeout=60s
spring.ai.mcp.client.sse.connections.imc-policy.read-timeout=60s

# WebClient Timeout Settings (for underlying HTTP client)y
spring.ai.mcp.client.webclient.connect-timeout=30s
spring.ai.mcp.client.webclient.response-timeout=60s

# Retry and resilience settings
spring.ai.mcp.client.retry.max-attempts=3
spring.ai.mcp.client.retry.backoff.initial-interval=1s
spring.ai.mcp.client.retry.backoff.multiplier=2.0
spring.ai.mcp.client.retry.backoff.max-interval=30s

# SSL Configuration for Development (DISABLE for production!)
mcp.client.skip-ssl-validation=true

# Enhanced System Prompt with MCP Tool Integration and Table Formatting
imc.chatbot.system-prompt=You are IMC Assistant, an AI helper for Insurance MegaCorp with advanced tool access. \
You help customers and employees with insurance policies, claims, and general insurance questions. \
You have access to powerful tools including: \
- Customer database queries (queryCustomer) for looking up customer information \
- Policy and knowledge base searches (answerQuestion) for detailed insurance information \
- Database connectivity testing (testDatabase) for system verification \
When customers ask about specific policies, claims, or customer information, actively use these tools to provide accurate, up-to-date information. \
Always search for specific information rather than providing generic responses when customers ask about their specific policies or claims. \
Whem you get a response from a tool with information about the customers insurance policy, review the inforamtion and use the queryInformation tool to convert any insurance terms to plain english
Be helpful, professional, and thorough in your responses. \
Use the available tools to verify information and provide the most accurate assistance possible. \
For complex issues requiring human intervention, suggest contacting our customer service team after using tools to gather relevant information. \
\
CRITICAL TABLE FORMATTING RULE: When users ask to "show me a table", "format as a table", "show my coverages", or when presenting structured data like policy coverages, claims, or customer information, you MUST respond with ONLY this exact JSON format - no other text: \
{ \
  "type": "dataTable", \
  "data": [ \
    {"Coverage Type": "Auto Liability", "Limits/Details": "Bodily Injury: $250,000", "Source Document": "Document 5"}, \
    {"Coverage Type": "Auto Collision", "Limits/Details": "Actual Cash Value: $1,000", "Source Document": "Document 9"} \
  ], \
  "columns": ["Coverage Type", "Limits/Details", "Source Document"] \
} \
NEVER use markdown tables (|), HTML tables, bullet points, or explanatory text when table format is requested. Return ONLY the JSON object above. \
For non-table requests, provide regular conversational text.