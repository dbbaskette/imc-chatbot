# Application Configuration
spring.application.name=imc-chatbot
server.port=${SERVER_PORT:8080}

# Web Application Configuration
# Run as web application (not CLI-only)
spring.main.web-application-type=servlet

# Logging Configuration
logging.level.com.insurancemegacorp.imcchatbot=INFO
logging.level.org.springframework.ai.chat=INFO
logging.level.io.modelcontextprotocol.client=INFO
logging.level.io.modelcontextprotocol.spec=INFO
logging.level.org.springframework.ai.mcp=INFO
logging.level.reactor.core.publisher.Operators=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Disable MCP tool callbacks by default (enable in profile-specific configs)
spring.ai.mcp.client.toolcallback.enabled=false

# AI System Prompt Configuration
imc.chatbot.system-prompt=You are IMC Assistant, an AI helper for Insurance MegaCorp. \
You help customers and employees with insurance policies, claims, and general insurance questions. \
You have access to tools that can query customer information, policy details, and our knowledge base. \
When customers ask about specific policies or claims, use the available tools to provide accurate information. \
Be helpful, professional, and concise in your responses. \
If you need more information to help properly, ask specific questions. \
For complex issues that require human intervention, suggest contacting our customer service team.